<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Calendar</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 2rem; color: #444; }
        .error { color: #b33; max-width: 420px; margin: 1rem auto; line-height: 1.4; }
    </style>
</head>
<body>
<p id="status">Возвращаемся в приложение…</p>
<script>
(function () {
    const PENDING_KEY = 'daGoogleCalendarOAuthPending';
    const hash = new URLSearchParams(String(window.location.hash || '').replace(/^#/, ''));
    const query = new URLSearchParams(window.location.search);

    const payload = {
        access_token: hash.get('access_token') || '',
        expires_in: hash.get('expires_in') || '',
        error: hash.get('error') || query.get('error') || '',
        error_description: hash.get('error_description') || query.get('error_description') || ''
    };

    try {
        sessionStorage.setItem(PENDING_KEY, JSON.stringify(payload));
    } catch (err) {
        console.warn('[google-oauth-callback]', err);
    }

    if (!payload.access_token && !payload.error) {
        document.getElementById('status').innerHTML = '<span class="error">Google не вернул токен. Проверьте redirect URI в Cloud Console:<br><code>http://127.0.0.1:8765/google-oauth-callback.html</code></span>';
        return;
    }

    if (payload.error === 'redirect_uri_mismatch') {
        document.getElementById('status').innerHTML = '<span class="error">redirect_uri_mismatch<br>Добавьте в Google Cloud Console → OAuth client → Authorized redirect URIs:<br><code>http://127.0.0.1:8765/google-oauth-callback.html</code><br><br><a href="./index.html">Вернуться в приложение</a></span>';
        sessionStorage.setItem('daGoogleCalendarSyncResume', '1');
        return;
    }

    window.location.replace('./index.html');
})();
</script>
</body>
</html>
